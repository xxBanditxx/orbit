name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "space/**"
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push space/ to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID || 'xxbanditxx/orbit-command-deck' }}
        run: |
          git clone "https://xxbanditxx:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" /tmp/hf-space

          rsync -av --delete \
            --exclude=".git" \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            --exclude="data/" \
            space/ /tmp/hf-space/

          cd /tmp/hf-space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "Sync from GitHub: ${GITHUB_SHA::7}"
          git push
